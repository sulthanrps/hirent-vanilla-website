<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset=""UTF-8>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
        <title>Login</title>

        <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles/alex-styling.css">
    </head>

    <body>
        <div class="container">

            <!--left panel-->
            <div class="left-panel">
                <div class="login-box">
                    <div class="logo">
                        <img src="assets/mountain_icon.png" alt="logo">
                    </div>

                    <h1>Welcome Back</h1>

                    <form>
                        <div class="input-box">
                            <span class="icon">✉</span>
                            <input type="email" placeholder="Email">
                        </div>

                        <div class="input-box">
                            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" placeholder="Password">
                        </div>
                            <button class="signin-btn">
                                <a href="product-display.html">
                                    Sign in
                                </a>
                            </button>
                    </form>

                    <div class="divider">
                        <span>or sign in with</span>
                    </div>

                    <div class="social-login">
                        <button class="social fb">
                            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                        </button>

                        <button class="social google">
                            <svg viewBox="0 0 48 48" width="30px" height="30px">
                                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/>
                                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            </svg>
                        </button>

                        <button class="social apple">
                            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M17.057 12.781c.032 2.588 2.254 3.462 2.287 3.477-.023.072-.351 1.201-1.152 2.365-.692 1.007-1.411 2.009-2.533 2.029-1.103.022-1.458-.648-2.72-.648-1.261 0-1.654.628-2.7.668-1.083.043-1.925-1.097-2.621-2.105-1.423-2.061-2.511-5.831-1.046-8.369.727-1.258 2.022-2.054 3.433-2.074 1.069-.02 2.078.719 2.735.719.658 0 1.879-.904 3.15-.775.533.022 2.029.213 2.991 1.614-.076.048-1.789 1.043-1.833 3.199zm-2.427-6.73c.566-.689.948-1.644.843-2.597-.819.033-1.812.544-2.399 1.23-.526.608-.987 1.58-.864 2.514.913.07 1.854-.458 2.42-1.147z"/>
                            </svg>
                        </button>
                    </div>

                    <p class="register">
                        don't have an account?
                        <a href="#">Register</a>
                    </p>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <img src="assets/hiking_outfit_login.jpg" alt="side image">
            </div>
        </div>
    </body>
</html>
